name = "historiaclinica"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".open-next"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "historiaclinica"
database_id = "32bf698b-f0e4-4822-9364-bdae236fe071"
migrations_dir = "drizzle/migrations"

# R2 Storage for medical images
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "historiaclinica-images"

# Environment variables for Cloudflare Access
[vars]
CF_ACCESS_TEAM_DOMAIN = "YOUR_TEAM.cloudflareaccess.com"
CF_ACCESS_AUD = "YOUR_APPLICATION_AUD_TAG"
